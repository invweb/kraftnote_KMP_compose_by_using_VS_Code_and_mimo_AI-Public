name: iosApp
options:
  bundleIdPrefix: com.complex
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true

settings:
  SWIFT_VERSION: "5.9"

targets:
  iosApp:
    type: application
    platform: iOS
    sources:
      - path: iosApp/iosApp
    info:
      path: iosApp/iosApp/Info.plist
      properties:
        UILaunchScreen: {}
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.complex.ios
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""
        TARGETED_DEVICE_FAMILY: "1,2"
        GENERATE_INFOPLIST_FILE: NO
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        FRAMEWORK_SEARCH_PATHS:
          - "$(inherited)"
          - "$(SRCROOT)/shared/build/bin/iosSimulatorArm64/debugFramework"
        OTHER_LDFLAGS:
          - "-framework"
          - "Shared"
    dependencies:
      - framework: "$(SRCROOT)/shared/build/bin/iosSimulatorArm64/debugFramework/Shared.framework"
        embed: true
